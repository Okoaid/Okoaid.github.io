<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okoaid — Connected Health Identity</title>
<meta name="description" content="Vos données médicales, là quand ça compte. Coming soon — Lubumbashi, RDC.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --teal:#0D5F5C;
  --green:#4DB86A;
  --bg:#061E1D;
  --bg2:#092524;
}

html,body{
  min-height:100vh;
  background:var(--bg);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* top gradient bar */
.topbar{
  position:fixed;
  top:0;left:0;width:100%;height:3px;
  background:linear-gradient(90deg,var(--teal),var(--green),var(--teal));
  background-size:200% 100%;
  animation:slide 3.5s linear infinite;
  z-index:100;
}
@keyframes slide{0%{background-position:0%}100%{background-position:200%}}

/* coming soon badge */
.badge{
  position:fixed;
  top:22px;right:28px;
  font-size:11px;
  font-weight:400;
  color:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:5px 14px;
  letter-spacing:0.04em;
  z-index:100;
  backdrop-filter:blur(4px);
}

/* page layout */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  position:relative;
  overflow:hidden;
}

/* NFC rings background */
.rings{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-52%);
  width:900px;height:900px;
  pointer-events:none;
  z-index:0;
}
.ring{
  position:absolute;
  border-radius:50%;
  border:1px solid rgba(77,184,106,0.08);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}
.ring:nth-child(1){width:200px;height:200px;border-color:rgba(77,184,106,0.18)}
.ring:nth-child(2){width:340px;height:340px;border-color:rgba(77,184,106,0.13)}
.ring:nth-child(3){width:500px;height:500px;border-color:rgba(77,184,106,0.09)}
.ring:nth-child(4){width:660px;height:660px;border-color:rgba(77,184,106,0.06)}
.ring:nth-child(5){width:820px;height:820px;border-color:rgba(77,184,106,0.04)}

/* glow behind logo */
.glow{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  width:320px;height:320px;
  background:radial-gradient(circle,rgba(77,184,106,0.22) 0%,rgba(13,95,92,0.10) 45%,transparent 70%);
  pointer-events:none;
  z-index:0;
}

/* main content */
.content{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:80px 24px 40px;
  position:relative;
  z-index:1;
  width:100%;
  max-width:760px;
  margin:0 auto;
}

/* logo */
.logo-wrap{
  margin-bottom:44px;
  filter:drop-shadow(0 0 30px rgba(255,255,255,0.25)) drop-shadow(0 0 60px rgba(77,184,106,0.45)) drop-shadow(0 0 120px rgba(77,184,106,0.15));
}
.logo-wrap img{
  width:240px;
  display:block;
  margin:0 auto;
  /* invert to white then colorize */
  /* logo shown as-is - teal and green work on dark bg */
}

/* tagline */
.tagline{
  font-size:clamp(30px,5vw,52px);
  font-weight:300;
  line-height:1.15;
  color:#fff;
  margin-bottom:12px;
  letter-spacing:-0.02em;
}
.tagline .accent{
  color:var(--green);
  font-weight:400;
}

.tagline-en{
  font-size:clamp(22px,3.5vw,38px);
  font-weight:300;
  line-height:1.2;
  color:rgba(255,255,255,0.55);
  margin-bottom:48px;
  letter-spacing:-0.01em;
}
.tagline-en .accent{
  color:var(--green);
  font-weight:400;
}

/* email form */
.form-wrap{
  display:flex;
  gap:0;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  overflow:hidden;
  margin-bottom:22px;
  width:100%;
  max-width:420px;
}
.form-wrap input{
  flex:1;
  background:rgba(255,255,255,0.05);
  border:none;
  outline:none;
  color:#fff;
  font-family:inherit;
  font-size:14px;
  font-weight:300;
  padding:14px 18px;
}
.form-wrap input::placeholder{color:rgba(255,255,255,0.35)}
.form-wrap button{
  background:var(--teal);
  border:none;
  outline:none;
  color:#fff;
  font-family:inherit;
  font-size:13px;
  font-weight:500;
  padding:0 22px;
  cursor:pointer;
  letter-spacing:0.02em;
  transition:background 0.15s;
  white-space:nowrap;
}
.form-wrap button:hover{background:#0f726e}

.confirm{
  display:none;
  font-size:13px;
  color:var(--green);
  font-style:italic;
  margin-bottom:10px;
}
.confirm.show{display:block}

/* location dot */
.location{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:rgba(255,255,255,0.40);
  letter-spacing:0.02em;
  margin-top:4px;
}
.loc-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:var(--green);
  flex-shrink:0;
  position:relative;
}
.loc-dot::after{
  content:'';
  position:absolute;
  inset:-3px;
  border-radius:50%;
  border:1px solid var(--green);
  animation:locripple 2s ease-out infinite;
}
@keyframes locripple{0%{opacity:.7;transform:scale(1)}100%{opacity:0;transform:scale(2.2)}}

/* footer */
footer{
  width:100%;
  padding:20px 32px 28px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-top:1px solid rgba(255,255,255,0.07);
  position:relative;
  z-index:1;
}
.foot-brand{
  font-size:11px;
  font-weight:500;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.35);
}
.foot-contact a{
  font-size:11px;
  color:rgba(255,255,255,0.35);
  text-decoration:none;
  letter-spacing:0.02em;
  transition:color 0.15s;
}
.foot-contact a:hover{color:var(--green)}

/* sparkle */


@media(max-width:520px){
  .badge{display:none}
  .logo-wrap img{width:190px}
  .form-wrap{flex-direction:column}
  .form-wrap button{padding:13px}
  footer{flex-direction:column;gap:8px;text-align:center}
}

@media(prefers-reduced-motion:reduce){
  .topbar,.loc-dot::after{animation:none}
}
</style>
</head>

<script>
function handleSubmit(){
  var input=document.getElementById('email-input');
  var confirm=document.getElementById('confirm');
  var val=input.value.trim();
  if(!val||!val.includes('@')){
    input.style.borderBottom='1px solid #E24B4A';
    setTimeout(function(){input.style.borderBottom=''},1800);
    return;
  }
  input.disabled=true;
  var btn=document.querySelector('.form-wrap button');
  btn.disabled=true;btn.textContent='✓';
  confirm.classList.add('show');
  fetch('https://formspree.io/f/mbdnazla',{
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body:JSON.stringify({email:val,source:'okoaid.com coming soon'})
  }).catch(function(){});
}
document.getElementById('email-input').addEventListener('keydown',function(e){
  if(e.key==='Enter')handleSubmit();
});
</script>
